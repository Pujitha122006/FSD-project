<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Real-Time Event Sync</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f8;
            text-align: center;
        }

        h1 {
            color: #333;
        }

        .container {
            width: 50%;
            margin: auto;
            background: white;
            padding: 20px;
            margin-top: 30px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            border-radius: 10px;
        }

        input, textarea {
            width: 90%;
            padding: 10px;
            margin: 10px;
        }

        button {
            padding: 10px 20px;
            background-color: #007BFF;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }

        button:hover {
            background-color: #0056b3;
        }

        .event {
            background: #eef;
            padding: 10px;
            margin: 10px;
            border-radius: 5px;
        }
    </style>
</head>

<body>

    <h1>📡 Real-Time Event Synchronization</h1>

    <div class="container">

        <h2>Add Event</h2>

        <form id="eventForm">
            <input type="text" id="title" placeholder="Enter Event Title" required>
            <br>
            <textarea id="description" placeholder="Enter Description"></textarea>
            <br>
            <button type="submit">Add Event</button>
        </form>

        <h2>📋 Event List</h2>
        <div id="events"></div>

    </div>

    <script src="script.js"></script>

</body>
</html>
